# Scribbr Configuration
# 녹음 및 자료 정리 파이프라인 설정
#
# 프로필 추가 방법:
#   profiles 아래에 새 항목을 추가하세요.
#   - type: lecture → /process-lecture 사용, report.md 생성
#   - type: meeting → /process-meeting 사용, summary.md 생성 + Notion 연동

default:
  stt_model: "mlx-community/whisper-large-v3-mlx"
  chunk_duration: 300  # seconds (5 min)
  conda_env: "cse"

profiles:

  # ──────────── Lectures ────────────

  cse-seminar:
    type: lecture
    name: "CSE Graduate Seminar (ESW5060)"
    data_dir: "data/lectures/cse-seminar"
    schedule: ".claude/knowledge/cse-seminar/Schedule.pdf"
    template: ".claude/templates/report_template.md"

  # ai-system:
  #   type: lecture
  #   name: "AI System Design (SWE6030)"
  #   data_dir: "data/lectures/ai-system"
  #   schedule: ".claude/knowledge/ai-system/Schedule.pdf"
  #   template: ".claude/templates/report_template.md"

  # ──────────── Meetings ────────────

  lab-meeting:
    type: meeting
    name: "Lab Weekly Meeting"
    data_dir: "data/meetings/lab-meeting"
    template: ".claude/templates/meeting_template.md"
    notion_page: ""  # 실행 시 --notion 인자로 지정하거나 여기에 기본값 설정

